<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      text-align: center;
      flex-direction: column;
    }

    .hero h1 span {
      color: #38bdf8;
    }

    .hero p {
      margin-top: 10px;
      color: #cbd5e1;
    }

    /* Email Box */
    .email-box {
      margin-top: 25px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #1e293b;
      padding: 12px 22px;
      border-radius: 40px;
      border: 1px solid #334155;
    }

    .email-box span {
      color: #38bdf8;
      font-weight: 500;
    }

    .email-box button {
      padding: 6px 16px;
      border: none;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .email-box button:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
    }

    .email-box button.copied {
      background: #22c55e;
      color: white;
    }

    /* Social Buttons */
    .social-links {
      margin-top: 30px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .social-links a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      color: white;
      transition: 0.3s ease;
    }

    /* Instagram */
    .instagram {
      background: #e1306c;
    }

    .instagram:hover {
      background: #c13584;
      transform: translateY(-3px);
    }

    /* Facebook */
    .facebook {
      background: #1877f2;
    }

    .facebook:hover {
      background: #0d65d9;
      transform: translateY(-3px);
    }

    /* GitHub */
    .github {
      background: #333;
    }

    .github:hover {
      background: #555;
      transform: translateY(-3px);
    }

    i {
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Hi, I'm <span>Jheian B. Lubas</span></h1>
    <p>Frontend Developer • Web Designer • IT Student</p>

    <div class="email-box">
      <span id="emailText">JheianLubas18@gmail.com</span>
      <button id="copyBtn" onclick="copyEmail()">Copy</button>
    </div>

    <!-- Social Buttons -->
    <div class="social-links">
      <a href="https://www.instagram.com/jjebbirishh?igsh=MXdnbXY5dWtxMTZudw==" target="_blank" class="instagram">
        <i class="fab fa-instagram"></i> Instagram
      </a>

      <a href="https://www.facebook.com/jheian.lubas.5" target="_blank" class="facebook">
        <i class="fab fa-facebook-f"></i> Facebook
      </a>

      <a href="https://github.com/jheianlubaa" target="_blank" class="github">
        <i class="fab fa-github"></i> GitHub
      </a>
    </div>
  </div>

  <script>
    function copyEmail() {
      const email = document.getElementById("emailText").innerText;
      const button = document.getElementById("copyBtn");

      navigator.clipboard.writeText(email).then(() => {
        button.innerText = "Copied ✓";
        button.classList.add("copied");

        setTimeout(() => {
          button.innerText = "Copy";
          button.classList.remove("copied");
        }, 2000);
      });
    }
  </script>

</body>

</html>
